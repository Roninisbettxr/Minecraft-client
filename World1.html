<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Enhanced Infinite Generation</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      user-select: none;
      background: #87CEEB;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 26px;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      text-shadow: 1px 1px 3px black;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.75);
      padding: 12px 18px;
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.6;
    }
    #hotbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(0, 0, 0, 0.65);
      padding: 8px;
      border-radius: 8px;
      z-index: 10;
    }
    .slot {
      width: 50px;
      height: 50px;
      border: 2px solid #555;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 11px;
      background: #222;
      text-align: center;
    }
    .slot.active {
      border-color: #fff;
      box-shadow: 0 0 10px #fff;
      background: #444;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

  <div id="crosshair">+</div>
  <div id="ui">
    <b>Click screen to play!</b><br>
    WASD = Move | Shift = Sprint | Space = Jump<br>
    1 - 5 = Switch Block Slot<br>
    Left Click = Break | Right Click = Place
  </div>

  <div id="hotbar">
    <div class="slot active" id="slot-1">1<br>Grass</div>
    <div class="slot" id="slot-2">2<br>Dirt</div>
    <div class="slot" id="slot-3">3<br>Stone</div>
    <div class="slot" id="slot-4">4<br>Wood</div>
    <div class="slot" id="slot-5">5<br>Glass</div>
  </div>

  <script>
    // 1. Scene, Camera, & Lighting Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.012);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 0.85);
    sunLight.position.set(80, 150, 50);
    scene.add(sunLight);

    // 2. Block Geometries & Materials
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const materials = {
      grass: new THREE.MeshLambertMaterial({ color: 0x5c8e32 }),
      sand: new THREE.MeshLambertMaterial({ color: 0xd2b48c }),
      dirt: new THREE.MeshLambertMaterial({ color: 0x866043 }),
      stone: new THREE.MeshLambertMaterial({ color: 0x757575 }),
      wood: new THREE.MeshLambertMaterial({ color: 0x614126 }),
      glass: new THREE.MeshLambertMaterial({ color: 0xadd8e6, transparent: true, opacity: 0.5 }),
      leaves: new THREE.MeshLambertMaterial({ color: 0x2e6f21, transparent: true, opacity: 0.85 }),
      water: new THREE.MeshLambertMaterial({ color: 0x3388ff, transparent: true, opacity: 0.6 })
    };

    const materialList = ['grass', 'dirt', 'stone', 'wood', 'glass'];
    let selectedMaterial = 'grass';

    // 3. Hotbar Slot Switching
    document.addEventListener('keydown', (e) => {
      const keyNum = parseInt(e.key);
      if (keyNum >= 1 && keyNum <= 5) {
        selectedMaterial = materialList[keyNum - 1];
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById(`slot-${keyNum}`).classList.add('active');
      }
    });

    // 4. Clouds Generation
    const cloudsGroup = new THREE.Group();
    const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.75 });
    for (let i = 0; i < 30; i++) {
      const cloud = new THREE.Mesh(new THREE.BoxGeometry(12 + Math.random() * 20, 3, 12 + Math.random() * 20), cloudMat);
      cloud.position.set((Math.random() - 0.5) * 300, 45, (Math.random() - 0.5) * 300);
      cloudsGroup.add(cloud);
    }
    scene.add(cloudsGroup);

    // 5. Terrain Generation Noise & World Logic
    const simplex = new SimplexNoise();
    const loadedChunks = {};
    const CHUNK_SIZE = 16;
    const RENDER_DISTANCE = 2;
    const placedBlocks = [];
    const WATER_LEVEL = 10;

    function getTerrainHeight(x, z) {
      const elevation = simplex.noise2D(x * 0.015, z * 0.015) * 12;
      const detail = simplex.noise2D(x * 0.06, z * 0.06) * 3;
      return Math.floor(elevation + detail) + 11;
    }

    function generateChunk(chunkX, chunkZ) {
      const chunkKey = `${chunkX},${chunkZ}`;
      if (loadedChunks[chunkKey]) return;

      const chunkGroup = new THREE.Group();

      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const worldX = chunkX * CHUNK_SIZE + x;
          const worldZ = chunkZ * CHUNK_SIZE + z;
          const surfaceY = getTerrainHeight(worldX, worldZ);

          // Top Surface Block (Beach / Grass)
          const topMat = surfaceY <= WATER_LEVEL + 1 ? materials.sand : materials.grass;
          const topMesh = new THREE.Mesh(boxGeo, topMat);
          topMesh.position.set(worldX, surfaceY, worldZ);
          chunkGroup.add(topMesh);
          placedBlocks.push(topMesh);

          // Sub-surface Dirt
          for (let y = surfaceY - 1; y >= surfaceY - 3; y--) {
            const dirtMesh = new THREE.Mesh(boxGeo, materials.dirt);
            dirtMesh.position.set(worldX, y, worldZ);
            chunkGroup.add(dirtMesh);
            placedBlocks.push(dirtMesh);
          }

          // Underground Stone
          for (let y = surfaceY - 4; y >= surfaceY - 6; y--) {
            const stoneMesh = new THREE.Mesh(boxGeo, materials.stone);
            stoneMesh.position.set(worldX, y, worldZ);
            chunkGroup.add(stoneMesh);
            placedBlocks.push(stoneMesh);
          }

          // Water Filler
          if (surfaceY < WATER_LEVEL) {
            for (let wy = surfaceY + 1; wy <= WATER_LEVEL; wy++) {
              const waterMesh = new THREE.Mesh(boxGeo, materials.water);
              waterMesh.position.set(worldX, wy, worldZ);
              chunkGroup.add(waterMesh);
            }
          }
        }
      }

      scene.add(chunkGroup);
      loadedChunks[chunkKey] = chunkGroup;
    }

    function updateChunks() {
      const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
      const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

      for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
        for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
          generateChunk(playerChunkX + x, playerChunkZ + z);
        }
      }
    }

    // 6. Movement & Camera Setup
    camera.position.set(0, 30, 0);

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, isSprinting = false, canJump = false;
    let velocityY = 0;
    const gravity = -0.014;

    document.addEventListener('click', () => {
      document.body.requestPointerLock();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'KeyW') moveForward = true;
      if (e.code === 'KeyS') moveBackward = true;
      if (e.code === 'KeyA') moveLeft = true;
      if (e.code === 'KeyD') moveRight = true;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') isSprinting = true;
      if (e.code === 'Space' && canJump) {
        velocityY = 0.24;
        canJump = false;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') moveForward = false;
      if (e.code === 'KeyS') moveBackward = false;
      if (e.code === 'KeyA') moveLeft = false;
      if (e.code === 'KeyD') moveRight = false;
      if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') isSprinting = false;
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === document.body) {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x -= e.movementY * 0.002;
        camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
      }
    });

    // 7. Raycasting (Break / Place)
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0, 0);

    document.addEventListener('mousedown', (e) => {
      if (document.pointerLockElement !== document.body) return;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(placedBlocks);

      if (intersects.length > 0) {
        const hit = intersects[0];

        if (e.button === 0) {
          // Left Click = Break Block
          scene.remove(hit.object);
          if (hit.object.parent) hit.object.parent.remove(hit.object);
          const idx = placedBlocks.indexOf(hit.object);
          if (idx > -1) placedBlocks.splice(idx, 1);
        } else if (e.button === 2) {
          // Right Click = Place Selected Block
          const normal = hit.face.normal;
          const newMesh = new THREE.Mesh(boxGeo, materials[selectedMaterial]);
          newMesh.position.copy(hit.object.position).add(normal);
          scene.add(newMesh);
          placedBlocks.push(newMesh);
        }
      }
    });

    document.addEventListener('contextmenu', e => e.preventDefault());

    // 8. Main Game Loop
    function animate() {
      requestAnimationFrame(animate);

      // Player Speed Logic (Normal vs Sprint)
      const speed = isSprinting ? 0.22 : 0.13;
      if (moveForward) camera.translateZ(-speed);
      if (moveBackward) camera.translateZ(speed);
      if (moveLeft) camera.translateX(-speed);
      if (moveRight) camera.translateX(speed);

      // Gravity & Ground Collision
      camera.position.y += velocityY;
      velocityY += gravity;

      const groundY = Math.max(
        getTerrainHeight(Math.round(camera.position.x), Math.round(camera.position.z)),
        WATER_LEVEL
      ) + 2;

      if (camera.position.y <= groundY) {
        camera.position.y = groundY;
        velocityY = 0;
        canJump = true;
      }

      // Slowly Drift Clouds Overhead
      cloudsGroup.children.forEach(c => {
        c.position.x += 0.02;
        if (c.position.x > 150) c.position.x = -150;
      });

      updateChunks();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
