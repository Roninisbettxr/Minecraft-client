<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Enhanced World Generation</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      user-select: none;
      background: #87CEEB;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 24px;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
      text-shadow: 1px 1px 2px black;
    }
    #ui {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      background: rgba(0, 0, 0, 0.75);
      padding: 12px 18px;
      border-radius: 8px;
      z-index: 10;
      font-size: 14px;
      line-height: 1.6;
    }
    #hotbar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px;
      border-radius: 8px;
      z-index: 10;
    }
    .slot {
      width: 45px;
      height: 45px;
      border: 2px solid #555;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
      background: #333;
    }
    .slot.active {
      border-color: #fff;
      box-shadow: 0 0 10px #fff;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simplex-noise/2.4.0/simplex-noise.min.js"></script>
</head>
<body>

  <div id="crosshair">+</div>
  <div id="ui">
    <b>Click screen to play!</b><br>
    WASD = Move | Space = Jump<br>
    1 - 5 = Switch Selected Block<br>
    Left Click = Break | Right Click = Place
  </div>

  <div id="hotbar">
    <div class="slot active" id="slot-1">1: Grass</div>
    <div class="slot" id="slot-2">2: Dirt</div>
    <div class="slot" id="slot-3">3: Stone</div>
    <div class="slot" id="slot-4">4: Wood</div>
    <div class="slot" id="slot-5">5: Glass</div>
  </div>

  <script>
    // 1. Scene, Camera, & Lighting Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.FogExp2(0x87CEEB, 0.015);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
    sunLight.position.set(80, 150, 50);
    scene.add(sunLight);

    // 2. Materials Setup
    const boxGeo = new THREE.BoxGeometry(1, 1, 1);
    const materials = {
      grass: new THREE.MeshLambertMaterial({ color: 0x5c8e32 }),
      dirt: new THREE.MeshLambertMaterial({ color: 0x866043 }),
      stone: new THREE.MeshLambertMaterial({ color: 0x757575 }),
      wood: new THREE.MeshLambertMaterial({ color: 0x614126 }),
      glass: new THREE.MeshLambertMaterial({ color: 0xadd8e6, transparent: true, opacity: 0.5 }),
      leaves: new THREE.MeshLambertMaterial({ color: 0x2e6f21, transparent: true, opacity: 0.85 })
    };

    const materialList = ['grass', 'dirt', 'stone', 'wood', 'glass'];
    let selectedMaterial = 'grass';

    // 3. Hotbar Selection Logic
    document.addEventListener('keydown', (e) => {
      const keyNum = parseInt(e.key);
      if (keyNum >= 1 && keyNum <= 5) {
        selectedMaterial = materialList[keyNum - 1];
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('active'));
        document.getElementById(`slot-${keyNum}`).classList.add('active');
      }
    });

    // 4. Enhanced Terrain Height Noise Function
    const simplex = new SimplexNoise();
    const loadedChunks = {};
    const CHUNK_SIZE = 16;
    const RENDER_DISTANCE = 2;
    const placedBlocks = [];

    function getTerrainHeight(x, z) {
      const continent = simplex.noise2D(x * 0.005, z * 0.005) * 15;
      const hills = simplex.noise2D(x * 0.03, z * 0.03) * 6;
      const detail = simplex.noise2D(x * 0.1, z * 0.1) * 1.5;
      
      return Math.floor(continent + hills + detail) + 12;
    }

    function generateChunk(chunkX, chunkZ) {
      const chunkKey = `${chunkX},${chunkZ}`;
      if (loadedChunks[chunkKey]) return;

      const chunkGroup = new THREE.Group();

      for (let x = 0; x < CHUNK_SIZE; x++) {
        for (let z = 0; z < CHUNK_SIZE; z++) {
          const worldX = chunkX * CHUNK_SIZE + x;
          const worldZ = chunkZ * CHUNK_SIZE + z;
          const surfaceY = getTerrainHeight(worldX, worldZ);

          // Top Grass Block
          const grassMesh = new THREE.Mesh(boxGeo, materials.grass);
          grassMesh.position.set(worldX, surfaceY, worldZ);
          chunkGroup.add(grassMesh);
          placedBlocks.push(grassMesh);

          // Sub-surface Dirt
          for (let y = surfaceY - 1; y >= surfaceY - 3; y--) {
            const dirtMesh = new THREE.Mesh(boxGeo, materials.dirt);
            dirtMesh.position.set(worldX, y, worldZ);
            chunkGroup.add(dirtMesh);
            placedBlocks.push(dirtMesh);
          }

          // Underground Stone Layer
          for (let y = surfaceY - 4; y >= surfaceY - 6; y--) {
            const stoneMesh = new THREE.Mesh(boxGeo, materials.stone);
            stoneMesh.position.set(worldX, y, worldZ);
            chunkGroup.add(stoneMesh);
            placedBlocks.push(stoneMesh);
          }
        }
      }

      scene.add(chunkGroup);
      loadedChunks[chunkKey] = chunkGroup;
    }

    function updateChunks() {
      const playerChunkX = Math.floor(camera.position.x / CHUNK_SIZE);
      const playerChunkZ = Math.floor(camera.position.z / CHUNK_SIZE);

      for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
        for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
          generateChunk(playerChunkX + x, playerChunkZ + z);
        }
      }
    }

    // 5. Controls & Camera Setup
    camera.position.set(0, 30, 0);

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
    let velocityY = 0;
    const gravity = -0.014;

    document.addEventListener('click', () => {
      document.body.requestPointerLock();
    });

    document.addEventListener('keydown', (e) => {
      if (e.code === 'KeyW') moveForward = true;
      if (e.code === 'KeyS') moveBackward = true;
      if (e.code === 'KeyA') moveLeft = true;
      if (e.code === 'KeyD') moveRight = true;
      if (e.code === 'Space' && canJump) {
        velocityY = 0.24;
        canJump = false;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.code === 'KeyW') moveForward = false;
      if (e.code === 'KeyS') moveBackward = false;
      if (e.code === 'KeyA') moveLeft = false;
      if (e.code === 'KeyD') moveRight = false;
    });

    document.addEventListener('mousemove', (e) => {
      if (document.pointerLockElement === document.body) {
        camera.rotation.y -= e.movementX * 0.002;
        camera.rotation.x -= e.movementY * 0.002;
        camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
      }
    });

    // 6. Block Place/Break Raycasting
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2(0, 0);

    document.addEventListener('mousedown', (e) => {
      if (document.pointerLockElement !== document.body) return;

      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(placedBlocks);

      if (intersects.length > 0) {
        const hit = intersects[0];

        if (e.button === 0) {
          // Break Block
          scene.remove(hit.object);
          if (hit.object.parent) hit.object.parent.remove(hit.object);
          const idx = placedBlocks.indexOf(hit.object);
          if (idx > -1) placedBlocks.splice(idx, 1);
        } else if (e.button === 2) {
          // Place Block
          const normal = hit.face.normal;
          const newMesh = new THREE.Mesh(boxGeo, materials[selectedMaterial]);
          newMesh.position.copy(hit.object.position).add(normal);
          scene.add(newMesh);
          placedBlocks.push(newMesh);
        }
      }
    });

    document.addEventListener('contextmenu', e => e.preventDefault());

    // 7. Game Loop
    function animate() {
      requestAnimationFrame(animate);

      const speed = 0.13;
      if (moveForward) camera.translateZ(-speed);
      if (moveBackward) camera.translateZ(speed);
      if (moveLeft) camera.translateX(-speed);
      if (moveRight) camera.translateX(speed);

      camera.position.y += velocityY;
      velocityY += gravity;

      const currentGroundY = getTerrainHeight(Math.round(camera.position.x), Math.round(camera.position.z)) + 2;
      if (camera.position.y <= currentGroundY) {
        camera.position.y = currentGroundY;
        velocityY = 0;
        canJump = true;
      }

      updateChunks();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
