<input type="text" id="join-server-input" placeholder="Enter Server Here!">
<button id="join-server-buttons">Join Server</button></b>

margin: 1px;

}




#Join-server-input:hover{

}














#join-server-title{

margin: 10px;
margin-bottom: 0%;
nav-down: 100px;
down: 100px;
color: white;
bold: true;

width: 100vw;
margin-top: 213px;

}

#Join-server-buttons{
width: 97vw;

}


#Join-server-buttons-2{

}








</style>






<script>
document.querySelector('#join-server-buttons').addEventListener('click', () => {
  // Read value directly from the input text box
  let proxyUrl = document.querySelector('#join-server-input').value.trim();
  
  if (!proxyUrl) {
    alert("Please enter a server address in the text box!");
    return;
  }

  // Automatically prepend wss:// if missing
  if (!proxyUrl.startsWith("ws://") && !proxyUrl.startsWith("wss://")) {
    proxyUrl = "wss://" + proxyUrl;
  }

  connectToProxy(proxyUrl);
});

function connectToProxy(url) {
  console.log("Connecting to:", url);

  try {
    const socket = new WebSocket(url);

    socket.onopen = () => {
      console.log("Connected to Minecraft Proxy!");
      alert("Successfully connected to server!");
      // Trigger game engine join sequence
    };

    socket.onerror = (err) => {
      alert("Failed to connect to proxy. Check console for details.");
      console.error(err);
    };
  } catch (err) {
    alert("Invalid WebSocket URL format.");
    console.error(err);
  }
}
</script>
