<script>
document.querySelector('#join-server-buttons').addEventListener('click', () => {
  let proxyUrl = document.querySelector('#join-server-input').value.trim();
  
  if (!proxyUrl) {
    proxyUrl = "minecraft-client-jzka.onrender.com";
  }

  if (!proxyUrl.startsWith("ws://") && !proxyUrl.startsWith("wss://")) {
    proxyUrl = "wss://" + proxyUrl;
  }

  connectToProxy(proxyUrl);
});

function connectToProxy(url) {
  const socket = new WebSocket(url);

  socket.onopen = () => {
    alert("Connected! Loading game...");
    
    // Send the player straight to your main game page!
    window.location.href = "index.html"; 
  };

  socket.onerror = (err) => {
    alert("Could not reach server!");
    console.error(err);
  };
}
</script>
