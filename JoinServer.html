<h3 id="join-server-title">Enter Server Here!</h3>
<input type="text" id="join-server-input" placeholder="Enter Server Here!">
<button id="join-server-buttons">Join Server</button></b>

#Join-server-input:hover{

#join-server-title{

margin: 10px;

nav-down: 100px;
down: 100px;

width: 100vw;

}

}


#Join-server-buttons-2{
width: 97vw;

border-radius: 50px;
font-size: 20px;


}

<script>
document.querySelector('#join-server-buttons').addEventListener('click', () => {
  const inputElement = document.querySelector('#join-server-input');
  
  // 1. Grab typed text OR fallback to placeholder text
  let proxyUrl = inputElement.value.trim() || inputElement.placeholder.trim();

  if (!proxyUrl) {
    alert("Please type a server address into the box!");
    return;
  }

  // 2. Prepend wss:// if missing
  if (!proxyUrl.startsWith("ws://") && !proxyUrl.startsWith("wss://")) {
    proxyUrl = "wss://" + proxyUrl;
  }

  console.log("Attempting connection to:", proxyUrl);
  connectToProxy(proxyUrl);
});

function connectToProxy(url) {
  alert("Connecting to: " + url);

  try {
    const socket = new WebSocket(url);

    socket.onopen = () => {
      console.log("Connected to WebSocket Server!");
      alert("SUCCESS: Connected to server!");
      // Insert your game join sequence here
    };

    socket.onerror = (err) => {
      alert("CONNECTION ERROR: Could not reach " + url + "\nCheck Developer Console (F12) for details.");
      console.error("WebSocket Error:", err);
    };

    socket.onclose = (evt) => {
      console.log("Connection closed:", evt);
    };
  } catch (err) {
    alert("INVALID URL: " + err.message);
    console.error(err);
  }
}
</script>
